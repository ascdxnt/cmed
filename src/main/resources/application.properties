spring.application.name=cmed

# Se define el puerto por el que se escucha el servidor web.
server.port=91

# Se define el formato de hora del log de la consola.
logging.pattern.dateformat=hh:mm

# Se evita el uso de cache en desarrollo.
spring.thymeleaf.cache=false

# Conexion local a la BD CitaMed en MySQL.
spring.datasource.url=jdbc:mysql://localhost:3306/citamed_db
spring.datasource.username=usuario_citamed
spring.datasource.password=la_Clave

# Driver y plataforma de comunicacion.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Mostrar informacion SQL en el log.
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
