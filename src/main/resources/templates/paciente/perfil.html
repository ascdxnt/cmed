<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body class="app-body">
        <div class="container-fluid p-0">
            <div class="d-flex">
                <aside th:replace="~{general/fragmentos :: sidebar('PACIENTE','perfil')}"></aside>
                <main class="flex-grow-1 content-area">
                    <h1 class="h5 fw-bold mb-5">Mi Perfil</h1>
                    <section class="card soft-card">
                        <div class="card-header bg-white">
                            <h2 class="h5 fw-bold mb-0">Información personal</h2>
                        </div>
                        <div class="card-body">
                            <div th:if="${paciente != null}" class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">Nombre completo</label>
                                    <input class="form-control" th:value="${paciente.usuario.nombre}" readonly="true"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Correo electrónico</label>
                                    <input class="form-control" th:value="${paciente.usuario.correo}" readonly="true"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Teléfono</label>
                                    <input class="form-control" th:value="${paciente.telefono}" readonly="true"/>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Fecha de nacimiento</label>
                                    <input class="form-control" th:value="${paciente.fechaNacimiento}" readonly="true"/>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Dirección</label>
                                    <input class="form-control" th:value="${paciente.direccion}" readonly="true"/>
                                </div>
                            </div>
                            <p th:if="${paciente == null}" class="text-secondary mb-0">No se encontró información de perfil para la sesión actual.</p>
                        </div>
                    </section>
                    <section class="card soft-card mt-4">
                        <div class="card-header bg-white">
                            <h2 class="h5 fw-bold mb-0">Cambiar contraseña</h2>
                        </div>
                        <div class="card-body">
                            <form class="row g-3 was-validated" th:action="@{/paciente/perfil/contrasena}" method="post">
                                <div class="col-md-4">
                                    <label class="form-label">Contraseña actual</label>
                                    <input class="form-control" type="password" name="actual" required="true"/>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Nueva contraseña</label>
                                    <input class="form-control" type="password" name="nueva" required="true"/>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Confirmar contraseña</label>
                                    <input class="form-control" type="password" name="confirmar" required="true"/>
                                </div>
                                <div class="col-12">
                                    <button class="btn btn-primary" type="submit">Actualizar contraseña</button>
                                </div>
                            </form>
                        </div>
                    </section>
                </main>
            </div>
        </div>
        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>
    </body>
</html>
