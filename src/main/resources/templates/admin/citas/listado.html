<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body class="app-body">
        <div class="container-fluid p-0">
            <div class="d-flex">
                <aside th:replace="~{general/fragmentos :: sidebar('ADMIN','citas')}"></aside>
                <main class="flex-grow-1 content-area">
                    <h1 class="h5 fw-bold mb-5">Gestión de Citas</h1>
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="h4 fw-bold mb-0">Todas las citas</h2>
                    </div>
                    <section class="card soft-card mb-4">
                        <div class="card-body">
                            <form class="row g-3 align-items-end" th:action="@{/admin/citas/listado}" method="get">
                                <div class="col-md-4">
                                    <label class="form-label">Médico</label>
                                    <select class="form-select" name="idDoctor">
                                        <option value="">Todos</option>
                                        <option th:each="d : ${doctores}" th:value="${d.idDoctor}"
                                                th:text="${d.usuario.nombre}"></option>
                                    </select>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Fecha</label>
                                    <input type="date" class="form-control" name="fecha" th:value="${fecha}"/>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">Estado</label>
                                    <select class="form-select" name="estado">
                                        <option value="">Todos</option>
                                        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <button class="btn btn-primary w-100" type="submit">Filtrar</button>
                                </div>
                            </form>
                        </div>
                    </section>
                    <section class="card soft-card">
                        <div class="card-body">
                            <table class="table table-hover align-middle">
                                <thead><tr><th>Paciente</th><th>Médico</th><th>Fecha</th><th>Hora</th><th>Motivo</th><th>Estado</th><th>Acciones</th></tr></thead>
                                <tbody>
                                    <tr th:each="c : ${citas}">
                                        <td>[[${c.paciente.usuario.nombre}]]</td>
                                        <td>[[${c.doctor.usuario.nombre}]]</td>
                                        <td>[[${c.fecha}]]</td>
                                        <td>[[${c.hora}]]</td>
                                        <td>[[${c.motivo}]]</td>
                                        <td><span class="badge text-bg-warning">[[${c.estado}]]</span></td>
                                        <td>
                                            <div class="d-flex gap-2" th:if="${c.estado.name() == 'PENDIENTE'}">
                                                <form th:action="@{/admin/citas/confirmar}" method="post">
                                                    <input type="hidden" name="idCita" th:value="${c.idCita}"/>
                                                    <button class="btn btn-sm btn-success" type="submit">Confirmar</button>
                                                </form>
                                                <form class="d-flex gap-2" th:action="@{/admin/citas/rechazar}" method="post">
                                                    <input type="hidden" name="idCita" th:value="${c.idCita}"/>
                                                    <input class="form-control form-control-sm" name="motivo"
                                                           placeholder="Motivo del rechazo" required="true"/>
                                                    <button class="btn btn-sm btn-danger" type="submit">Rechazar</button>
                                                </form>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </main>
            </div>
        </div>
        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>
    </body>
</html>
