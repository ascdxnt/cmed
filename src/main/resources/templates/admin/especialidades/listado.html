<!doctype html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"></head>
    <body class="app-body">
        <div class="container-fluid p-0">
            <div class="d-flex">
                <aside th:replace="~{general/fragmentos :: sidebar('ADMIN','especialidades')}"></aside>
                <main class="flex-grow-1 content-area">
                    <h1 class="h5 fw-bold mb-5">Gestión de Especialidades</h1>
                    <section class="card soft-card mb-4">
                        <div class="card-header bg-white">
                            <h2 class="h5 fw-bold mb-0">Nueva especialidad médica</h2>
                        </div>
                        <div class="card-body">
                            <form class="row g-2" th:action="@{/admin/especialidades/guardar}" method="post">
                                <div class="col-md-4">
                                    <input class="form-control" name="nombre" placeholder="Nombre de especialidad" required="true"/>
                                </div>
                                <div class="col-md-6">
                                    <input class="form-control" name="descripcion" placeholder="Descripción clínica"/>
                                </div>
                                <div class="col-md-2 d-grid">
                                    <button class="btn btn-primary" type="submit">Guardar</button>
                                </div>
                            </form>
                        </div>
                    </section>
                    <section class="card soft-card">
                        <div class="card-body">
                            <table class="table table-hover align-middle">
                                <thead><tr><th>Especialidad</th><th>Descripción</th><th>Estado</th></tr></thead>
                                <tbody>
                                    <tr th:each="e : ${especialidades}">
                                        <td>[[${e.nombre}]]</td>
                                        <td>[[${e.descripcion}]]</td>
                                        <td>
                                            <span th:if="${e.activo}" class="badge text-bg-success">Activa</span>
                                            <span th:unless="${e.activo}" class="badge text-bg-danger">Inactiva</span>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>
                </main>
            </div>
        </div>
        <section th:replace="~{general/fragmentos :: mostrarToast}"></section>
    </body>
</html>
